<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docrys & DC — Plan Digital 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Poppins,system-ui,sans-serif;background:#f5f0e8;color:#1a1205;min-height:100vh}

/* ── HEADER ── */
.hdr{background:#0d0d0d;padding:14px 16px 0;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.util-nav-inline{display:flex;gap:6px;flex-wrap:wrap}
.util-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1.5px solid rgba(201,168,76,.3);background:none;cursor:pointer;font-family:inherit;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(201,168,76,.55);transition:all .2s;white-space:nowrap}
.util-btn:hover{background:rgba(201,168,76,.1);border-color:#c9a84c;color:#c9a84c}
.util-btn.on{background:rgba(201,168,76,.15);border-color:#c9a84c;color:#c9a84c}
.hdr-brand{display:flex;flex-direction:column}
.hdr-eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:#c9a84c;font-weight:700;margin-bottom:2px}
.hdr-title{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1.2}
.hdr-stats{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.stat{text-align:center;min-width:36px}
.stat-n{font-size:17px;font-weight:700;line-height:1}
.stat-l{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:2px}
.save-badge{font-size:10px;padding:3px 8px;border-radius:10px;letter-spacing:.06em;background:rgba(255,255,255,.08)}
.pts-badge{display:flex;align-items:center;gap:5px;background:rgba(255,110,180,.12);border:1.5px solid #ff6eb4;padding:4px 10px;border-radius:20px}
.pts-n{font-size:15px;font-weight:800;color:#ff6eb4;line-height:1}
.pts-l{font-size:9px;font-weight:700;color:rgba(255,110,180,.7);letter-spacing:.1em;text-transform:uppercase}

/* ── SECTION SWITCHER ── */
.section-switcher{display:flex;gap:6px;padding:10px 0 0;overflow-x:auto;scrollbar-width:none}
.section-switcher::-webkit-scrollbar{display:none}
.sec-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border:1.5px solid rgba(255,255,255,.12);border-radius:8px 8px 0 0;background:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);transition:all .2s;white-space:nowrap;border-bottom:none}
.sec-btn:hover{color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.25)}
.sec-btn.on{background:#f5f0e8;color:#1a1205;border-color:#c9a84c;border-bottom-color:#f5f0e8}
.sec-btn.on.seo{background:#f5f0e8;color:#1a4a48}
.sec-btn.on.pub{background:#f5f0e8;color:#3a0066}
.sec-icon{font-size:14px}

/* ── MONTH TABS ── */
.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;background:#0d0d0d;padding:0 0 0}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 13px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.72);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.on{color:#fff;font-weight:800;background:rgba(255,255,255,.18);border-radius:6px 6px 0 0;border-bottom-color:transparent}
.tab.on.seo-tab{color:#2c8e8a;border-bottom-color:#2c8e8a}
.tab.on.pub-tab{color:#a855f7;border-bottom-color:#a855f7}

.prog{height:3px;background:rgba(0,0,0,.1)}
.prog-bar{height:3px;transition:width .4s}
.prog-bar.rrss{background:linear-gradient(90deg,#c9a84c,#f0c96a)}
.prog-bar.seo{background:linear-gradient(90deg,#2c8e8a,#4fd1cd)}
.prog-bar.pub{background:linear-gradient(90deg,#a855f7,#d8b4fe)}

/* ── BODY ── */
.body{padding:16px;max-width:900px;margin:0 auto}
.mth-hd{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.mth-accent{width:4px;height:28px;border-radius:2px;flex-shrink:0}
.mth-accent.rrss{background:#c9a84c}
.mth-accent.seo{background:#2c8e8a}
.mth-accent.pub{background:#a855f7}
.mth-name{font-size:18px;font-weight:700;color:#0d0d0d;letter-spacing:-.02em}
.mth-sub{font-size:11px;color:#6b5f4e;letter-spacing:.06em;margin-top:1px}

/* ── WEEK (RRSS) ── */
.week{border:1px solid rgba(201,168,76,.3);border-radius:10px;overflow:hidden;background:#fff;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.week-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;border:none;background:none;width:100%;font-family:inherit;gap:10px;transition:background .2s}
.week-hdr:hover{background:#f5f0e8}
.week-hdr.on{background:#0d0d0d}
.wk-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.wk-label{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#1a1205}
.week-hdr.on .wk-label{color:#fff}
.wk-badges{display:flex;gap:4px;flex-wrap:wrap}
.wbadge{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700;letter-spacing:.06em}
.wbadge.apr{background:#f0fdf4;color:#166534}
.wbadge.rev{background:#fffbeb;color:#92400e}
.wbadge.tot{background:#f5f0e8;color:#6b5f4e}
.week-hdr.on .wbadge.tot{background:rgba(255,255,255,.1);color:rgba(255,255,255,.4)}
.wk-arrow{font-size:11px;color:#6b5f4e;transition:transform .25s;flex-shrink:0}
.week-hdr.on .wk-arrow{color:rgba(255,255,255,.4);transform:rotate(180deg)}
.week-body{padding:14px}
.plat-hdr{display:flex;align-items:center;gap:6px;padding-bottom:10px;margin-bottom:12px;border-bottom:2px solid #c9a84c}
.plat-name{font-size:11px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#8b6914}
.plat-count{font-size:10px;color:#6b5f4e;margin-left:auto;letter-spacing:.06em}
.posts-grid{display:flex;flex-direction:column;gap:12px}

/* ── CARD (shared) ── */
.card{background:#fafaf8;border:1px solid rgba(201,168,76,.2);border-radius:10px;border-left:4px solid #ccc;padding:13px 14px;display:flex;flex-direction:column;gap:10px;transition:box-shadow .2s}
.card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.card.approved{border-left-color:#22c55e !important;background:linear-gradient(135deg,#f0fdf4,#fafaf8)}
.card.seo-card{border-color:rgba(44,142,138,.2)}
.card.pub-card{border-color:rgba(168,85,247,.2)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-badges{display:flex;flex-direction:column;gap:3px}
.type-badge{display:inline-block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;padding:2px 8px;border-radius:4px;align-self:flex-start}
.pillar-tag{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#8c7a68;font-weight:500}
.st-btn{font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;padding:4px 10px;border-radius:12px;cursor:pointer;border:1.5px solid;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:all .15s}
.st-btn:hover{transform:scale(1.05)}
.field-label{font-size:10px;color:#8c7a68;margin-bottom:4px;letter-spacing:.06em;text-transform:uppercase;display:block}
.topic-input{width:100%;padding:9px 11px;border:1.5px solid rgba(201,168,76,.25);border-radius:6px;font-family:inherit;font-size:13px;font-weight:500;color:#1a1205;outline:none;background:#f5f0e8;transition:all .2s}
.topic-input:focus{border-color:#c9a84c;background:#fff;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.topic-input.seo{border-color:rgba(44,142,138,.3);}
.topic-input.seo:focus{border-color:#2c8e8a;box-shadow:0 0 0 3px rgba(44,142,138,.1)}
.topic-input.pub{border-color:rgba(168,85,247,.3);}
.topic-input.pub:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,.1)}
.post-textarea{width:100%;min-height:80px;padding:10px 12px;border:1.5px solid rgba(201,168,76,.18);border-radius:6px;font-family:inherit;font-size:12px;color:#1a1205;line-height:1.7;resize:vertical;outline:none;background:#fff;transition:all .2s}
.post-textarea:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.post-textarea::placeholder{color:#bbb;font-size:11px}
.firma-box{background:#f5f0e8;border:1.5px dashed rgba(201,168,76,.35);border-radius:6px;padding:8px 12px;font-size:11px;color:#8b6914;letter-spacing:.04em;line-height:1.6;user-select:all}
.firma-hint{font-size:10px;color:#b09060;letter-spacing:.06em;text-transform:uppercase;margin-top:5px;font-weight:600;display:flex;align-items:center;gap:4px}
.hashtag-textarea{width:100%;min-height:44px;padding:9px 12px;border:1.5px solid rgba(201,168,76,.18);border-radius:6px;font-family:inherit;font-size:11px;color:#8b6914;line-height:1.6;resize:vertical;outline:none;background:#fff;transition:all .2s}
.hashtag-textarea:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.hashtag-textarea::placeholder{color:#ccc;font-size:11px}
.link-input{width:100%;padding:9px 11px;border:1.5px solid rgba(201,168,76,.18);border-radius:6px;font-family:inherit;font-size:12px;color:#8c7a68;outline:none;background:#fff;transition:all .2s}
.link-input:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.link-input::placeholder{color:#ccc}
.link-input.seo:focus{border-color:#2c8e8a;box-shadow:0 0 0 3px rgba(44,142,138,.1)}
.link-input.pub:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,.1)}
.date-input{width:100%;padding:9px 11px;border:1.5px solid rgba(201,168,76,.18);border-radius:6px;font-family:inherit;font-size:12px;color:#1a1205;outline:none;background:#fff;transition:all .2s}
.date-input:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.fields-stack{display:flex;flex-direction:column;gap:10px}
.del-btn{font-size:10px;color:#ddd;background:none;border:none;cursor:pointer;font-family:inherit;padding:2px 6px;transition:color .15s;border-radius:4px}
.del-btn:hover{color:#c0392b;background:#fef2f2}

/* ── MEDIOS DIGITALES ── */
.medios-section{display:flex;flex-direction:column;gap:16px}
.medios-card{background:#fff;border:1px solid rgba(99,102,241,.2);border-left:4px solid #6366f1;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:14px;box-shadow:0 2px 8px rgba(99,102,241,.06)}
.medios-card-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px}
.medios-badge{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:3px 10px;border-radius:12px;background:#eef2ff;color:#4338ca}
.medios-field label{font-size:10px;color:#6366f1;margin-bottom:4px;letter-spacing:.06em;text-transform:uppercase;font-weight:700;display:block}
.medios-field input,.medios-field textarea{width:100%;padding:9px 11px;border:1.5px solid rgba(99,102,241,.2);border-radius:6px;font-family:inherit;font-size:13px;color:#1a1205;outline:none;background:#f5f5ff;transition:all .2s}
.medios-field input:focus,.medios-field textarea:focus{border-color:#6366f1;background:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.medios-field textarea{resize:vertical;min-height:120px;line-height:1.7}
.medios-field input::placeholder,.medios-field textarea::placeholder{color:#c7c7e0;font-size:11px}
.medios-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.medios-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:600px){.medios-grid-2,.medios-grid-3{grid-template-columns:1fr}}
.medios-titulares{display:flex;flex-direction:column;gap:8px;background:#f0f0ff;border:1.5px solid rgba(99,102,241,.15);border-radius:8px;padding:12px}
.medios-titular-main input{font-weight:700;font-size:14px}
.medios-titular-opt{opacity:.7}
.medios-fotos-block{display:flex;flex-direction:column;gap:8px;background:#f5f5ff;border:1.5px solid rgba(99,102,241,.15);border-radius:8px;padding:12px}
.medios-foto-row{display:flex;align-items:center;gap:8px}
.medios-foto-num{font-size:10px;font-weight:800;color:#6366f1;min-width:18px}
.medios-foto-selected{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:10px;background:#eef2ff;color:#4338ca;white-space:nowrap}
.medios-foto-check{width:18px;height:18px;border-radius:50%;border:2px solid #6366f1;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s;background:#fff}
.medios-foto-check.sel{background:#6366f1;border-color:#6366f1;color:#fff}
.medios-add-btn{display:flex;align-items:center;gap:8px;width:100%;padding:12px 16px;border:1.5px dashed rgba(99,102,241,.35);border-radius:8px;background:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#4338ca;transition:all .2s}
.medios-add-btn:hover{background:#eef2ff;border-color:#6366f1}
.medios-empty{text-align:center;padding:24px;color:#a5b4fc;font-size:12px}
.tab.medios-tab{color:rgba(99,102,241,.5)}
.tab.on.medios-tab{background:#6366f1;color:#fff;border-color:#4338ca}

.sec-btn.medios.on{background:#f5f0e8;color:#4338ca;border-color:#6366f1;border-bottom-color:#f5f0e8}
.mth-accent.medios{background:#6366f1}
.prog-bar.medios{background:linear-gradient(90deg,#6366f1,#818cf8)}


.budget-block{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:rgba(168,85,247,.04);border:1.5px solid rgba(168,85,247,.2);border-radius:8px;padding:10px 12px}
@media(max-width:500px){.budget-block{grid-template-columns:1fr}}
.budget-amount-wrap,.budget-tipo-wrap{display:flex;flex-direction:column;gap:4px}

/* ── ENVIAR AL CLIENTE ── */
.st-select{padding:5px 10px;border-radius:8px;border:1.5px solid rgba(201,168,76,.35);background:#fff;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:#1a1205;outline:none;transition:all .2s}
.st-select:focus{border-color:#c9a84c;box-shadow:0 0 0 2px rgba(201,168,76,.15)}
.card.cambios{border-left-color:#f97316;background:linear-gradient(135deg,#fff7ed,#fff)}
.seo-card.cambios{border-left-color:#f97316}
.pub-card.cambios{border-left-color:#f97316}
.medios-card.cambios{border-left-color:#f97316}

.del-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;backdrop-filter:blur(2px)}
.del-modal{background:#fff;border-radius:14px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;animation:modalIn .2s ease}
@keyframes modalIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.del-modal-hdr{display:flex;align-items:flex-start;gap:12px;padding:20px 20px 16px;border-bottom:1px solid #f1f5f9}
.del-modal-icon{font-size:28px;flex-shrink:0;line-height:1}
.del-modal-title{font-size:15px;font-weight:800;color:#1a1205}
.del-modal-sub{font-size:12px;color:#6b7280;margin-top:3px;line-height:1.4}
.del-modal-body{display:flex;flex-direction:column;gap:16px;padding:18px 20px}
.del-modal-field{display:flex;flex-direction:column;gap:6px}
.del-modal-label{font-size:12px;color:#374151;line-height:1.5}
.del-modal-input{width:100%;padding:10px 12px;border:2px solid #e5e7eb;border-radius:8px;font-family:inherit;font-size:14px;color:#1a1205;outline:none;transition:all .2s}
.del-modal-input:focus{border-color:#ef4444;box-shadow:0 0 0 3px rgba(239,68,68,.1)}
.del-modal-input.ok{border-color:#22c55e;background:#f0fdf4}
.del-modal-actions{display:flex;gap:10px;padding:0 20px 20px;justify-content:flex-end}
.del-modal-cancel{padding:9px 18px;border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:#374151;transition:all .2s}
.del-modal-cancel:hover{background:#f9fafb}
.del-modal-confirm{padding:9px 18px;border-radius:8px;border:none;background:#ef4444;cursor:pointer;font-family:inherit;font-size:13px;font-weight:800;color:#fff;transition:all .2s}
.del-modal-confirm:hover:not(:disabled){background:#dc2626}

/* ── NAME SELECTOR ── */
.name-selector{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.name-btn{padding:5px 12px;border-radius:20px;border:1.5px solid rgba(201,168,76,.3);background:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:#5c4a1e;transition:all .15s}
.name-btn:hover{border-color:#c9a84c;background:#fef9ee}
.name-btn.sel{background:#c9a84c;border-color:#c9a84c;color:#0d0d0d;font-weight:800}

.send-client-wrap{display:flex;flex-direction:column;gap:0}
.send-client-toggle{display:flex;align-items:center;gap:6px;padding:7px 10px;border:1.5px solid #bfdbfe;border-radius:8px;background:#f0f7ff;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:#1d4ed8;text-align:left;transition:all .2s;width:100%}
.send-client-toggle:hover{background:#dbeafe}
.send-client-toggle.open{border-radius:8px 8px 0 0;border-bottom-color:transparent}
.send-client-toggle.done{background:#f0fdf4;border-color:#86efac;color:#16a34a}
.send-client-discard{padding:8px 14px;border-radius:6px;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:#6b7280;transition:all .2s}
.send-client-discard:hover{border-color:#9ca3af;color:#374151}
.send-client-block{border:1.5px solid #bfdbfe;border-top:none;border-radius:0 0 8px 8px;background:linear-gradient(135deg,#f0f7ff,#e8f4fd);padding:12px 14px;display:flex;flex-direction:column;gap:10px}

.send-client-title{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#1d4ed8;display:flex;align-items:center;gap:6px}
.send-client-row{display:flex;flex-direction:column;gap:4px}
.send-client-label{font-size:10px;font-weight:700;color:#3b82f6;letter-spacing:.06em;text-transform:uppercase}
.send-client-input-wrap{position:relative}
.send-client-input{width:100%;padding:8px 11px;border:1.5px solid #bfdbfe;border-radius:6px;font-family:inherit;font-size:13px;color:#1e3a5f;outline:none;background:#fff;transition:all .2s}
.send-client-input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.send-client-input::placeholder{color:#ccc;font-size:11px}
.send-client-suggestions{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid #bfdbfe;border-top:none;border-radius:0 0 6px 6px;z-index:20;max-height:140px;overflow-y:auto}
.send-client-sug-item{padding:8px 11px;font-size:12px;color:#1e3a5f;cursor:pointer;border-bottom:1px solid #f1f5f9}
.send-client-sug-item:hover{background:#eff6ff}
.send-client-actions{display:flex;gap:8px;align-items:center}
.send-client-btn{flex:1;padding:10px 16px;border-radius:8px;border:none;background:#2563eb;cursor:pointer;font-family:inherit;font-size:12px;font-weight:800;color:#fff;letter-spacing:.06em;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.send-client-btn:hover{background:#1d4ed8}
.send-client-btn:disabled{background:#93c5fd;cursor:not-allowed}
.send-client-sent{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#16a34a;padding:6px 10px;background:#f0fdf4;border-radius:6px}

/* ── HISTORIAL ── */
.historial-block{background:#fafafa;border:1px solid rgba(0,0,0,.06);border-radius:6px;overflow:hidden;margin-bottom:2px}
.historial-toggle{width:100%;display:flex;align-items:center;gap:6px;padding:7px 10px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;color:#666;text-align:left}
.historial-toggle:hover{background:rgba(0,0,0,.03)}

function PostCard({planCfg,data,onUpdate,onDelete,onApprove}){
  const type=planCfg?planCfg.type:(data.type||'reel');

  const pillar=planCfg?planCfg.pillar:(data.pillar||'');
  const[confirming,setConfirming]=useState(null);
  const[nameInput,setNameInput]=useState('');
  const[newCorr,setNewCorr]=useState('');
  const[histOpen,setHistOpen]=useState(false);
  const[showDel,setShowDel]=useState(false);

  const correcciones=data.correcciones||[];
  const historial=data.historial||[];
  const pendientes=correcciones.filter(function(c){return !c.done;}).length;

  function addCorreccion(){
    const txt=newCorr.trim(); if(!txt)return;
    const now=new Date().toLocaleString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    onUpdate('correcciones',[...correcciones,{id:Date.now(),texto:txt,done:false,creadaAt:now}]);
    setNewCorr('');
  }
  function toggleCorreccion(id){onUpdate('correcciones',correcciones.map(function(c){return c.id===id?{...c,done:!c.done}:c;}));}
  function deleteCorreccion(id){onUpdate('correcciones',correcciones.filter(function(c){return c.id!==id;}));}

  function selectStatus(val){
    if(val===data.status)return;
    if(val==='revision'){setConfirming('enviar_revision');setNameInput('');}
    else if(val==='aprobado'){setConfirming('aprobar');setNameInput('');}
    else if(val==='cambios'){setConfirming('pedir_cambios');setNameInput('');}
    else if(val==='pendiente'){setConfirming('reset_pendiente');setNameInput('');}
  }
  function handleConfirm(revNum){
    const now=new Date().toLocaleString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const name=nameInput.trim()||'Sin nombre';
    const revLabel=revNum?(' — '+revNum):'';
    const accionLabel={enviar_revision:'📤 Enviado a revisión'+revLabel,aprobar:'✅ Aprobado',pedir_cambios:'🟠 Solicitud de cambios'}[confirming]||confirming;
    const hist=[...historial,{accion:accionLabel,nombre:name,fecha:now}];
    onUpdate('historial',hist);
    if(confirming==='enviar_revision'){
      onUpdate('status','revision');onUpdate('revisionBy',name+(revNum?' ('+revNum+')':''));onUpdate('revisionAt',now);
      sendEmail('rrss','revision',name,now,(revNum?'['+revNum+'] ':' ')+(data.topic||'Post RRSS'));
    } else if(confirming==='aprobar'){
      onUpdate('status','aprobado');onUpdate('approvedBy',name);onUpdate('approvedAt',now);
      onApprove();sendEmail('rrss','aprobado',name,now,data.topic||'Post RRSS');

      sendEmail('rrss','revision',name,now,'[Cambios] '+(data.topic||'Post RRSS'));
    }
    else if(confirming==='reset_pendiente'){
      onUpdate('status','pendiente');

  function addCorreccion(){
    const txt=newCorr.trim(); if(!txt)return;
    const now=new Date().toLocaleString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    onUpdate('corrPub',[...correcciones,{id:Date.now(),texto:txt,done:false,creadaAt:now}]);
    setNewCorr('');
  }
  function toggle(id){onUpdate('corrPub',correcciones.map(function(c){return c.id===id?{...c,done:!c.done}:c;}));}
  function del(id){onUpdate('corrPub',correcciones.filter(function(c){return c.id!==id;}));}

      React.createElement('input',{className:'corr-input',type:'text',value:newCorr,

function MediosArticleCard({data,idx,onUpdate,onDelete,onApprove}){
  const[open,setOpen]=useState(true);
  const[confirming,setConfirming]=useState(null);
  const[nameInput,setNameInput]=useState('');
  const[histOpen,setHistOpen]=useState(false);
  const[showDel,setShowDel]=useState(false);
  const s=SC[data.status]||SC.pendiente;
  const historial=data.historial||[];

  function setFoto(i){onUpdate('fotoSeleccionada',i);}
  function selectStatus(val){
    if(val===data.status)return;
    if(val==='revision'){setConfirming('enviar_revision');setNameInput('');}
    else if(val==='aprobado'){setConfirming('aprobar');setNameInput('');}
    else if(val==='cambios'){setConfirming('pedir_cambios');setNameInput('');}
    else if(val==='pendiente'){setConfirming('reset_pendiente');setNameInput('');}
  }
  function selectStatus(val){
    if(val===data.status)return;
    if(val==='revision'){setConfirming('enviar_revision');setNameInput('');}
    else if(val==='aprobado'){setConfirming('aprobar');setNameInput('');}
    else if(val==='cambios'){setConfirming('pedir_cambios');setNameInput('');}
    else if(val==='pendiente'){setConfirming('reset_pendiente');setNameInput('');}
  }
  function handleConfirm(revNum){
    const now=new Date().toLocaleString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const name=nameInput.trim()||'Sin nombre';
    const revLabel=revNum?(' — '+revNum):'';
    const accionLabel={
      enviar_revision:'📤 Enviado a revisión'+revLabel,
      aprobar:'✅ Aprobado',
      pedir_cambios:'🟠 Solicitud de cambios',
    }[confirming]||confirming;
    const hist=[...historial,{accion:accionLabel,nombre:name,fecha:now}];
    onUpdate('historial',hist);
    if(confirming==='enviar_revision'){
      onUpdate('status','revision');onUpdate('revisionBy',name+(revNum?' ('+revNum+')':''));onUpdate('revisionAt',now);
      sendEmail('medios','revision',name,now,(revNum?'['+revNum+'] ':'')+(data.titular||'Artículo Medios'||''));
    } else if(confirming==='aprobar'){
      onUpdate('status','aprobado');onUpdate('approvedBy',name);onUpdate('approvedAt',now);
      onApprove();
      sendEmail('medios','aprobado',name,now,data.titular||'Artículo Medios'||'');
    } else if(confirming==='pedir_cambios'){
      onUpdate('status','cambios');onUpdate('revisionBy',name);onUpdate('revisionAt',now);
      sendEmail('medios','revision',name,now,'[Cambios] '+(data.titular||'Artículo Medios'||''));
    }
    else if(confirming==='reset_pendiente'){
      onUpdate('status','pendiente');
    }
    setConfirming(null);setNameInput('');
  }


  return React.createElement('div',{className:'medios-card'},
    React.createElement('div',{className:'medios-card-hdr'},
      React.createElement('button',{
        onClick:function(){setOpen(function(o){return !o;});},
        style:{display:'flex',alignItems:'center',gap:8,background:'none',border:'none',cursor:'pointer'}
      },
        React.createElement('span',{className:'medios-badge'},'Artículo '+(idx+1)),
        React.createElement('span',{style:{fontSize:11,color:'#a5b4fc',letterSpacing:'.06em'}},(data.titular||'Sin titular')+(open?'  ▲':'  ▼'))
      ),
      React.createElement('div',{style:{display:'flex',gap:6,alignItems:'center'}},
        React.createElement('select',{
          className:'st-select',
          value:data.status||'pendiente',
          onChange:function(e){selectStatus(e.target.value);}
        },
          React.createElement('option',{value:'pendiente'},'⬜ Pendiente de diseño'),
          React.createElement('option',{value:'revision'},'🔵 Enviado a revisión'),
          React.createElement('option',{value:'cambios'},'🟠 Solicitud de cambios'),
          React.createElement('option',{value:'aprobado'},'✅ Aprobado')
        ),
        onDelete&&React.createElement('button',{className:'del-btn',title:'Borrar',onClick:function(){setShowDel(true);}},'🗑️')
      )
    ),
    showDel&&onDelete&&React.createElement(DeleteModal,{titulo:data.titular||'Artículo Medios',onConfirm:function(n){onDelete();setShowDel(false);},onCancel:function(){setShowDel(false);}}),
    historial.length>0&&React.createElement('div',{className:'historial-block'},
      React.createElement('button',{className:'historial-toggle',onClick:function(){setHistOpen(function(o){return !o;});}},
        histOpen?'▾':'▸',' 📋 Historial de cambios',React.createElement('span',{className:'historial-count'},historial.length)
      ),
      histOpen&&React.createElement('div',{className:'historial-list'},
        historial.map(function(h,i){
          return React.createElement('div',{key:i,className:'historial-item'},
            React.createElement('span',{className:'historial-icon'},{revision:'📤',aprobado:'✅',devuelto:'↩️'}[h.accion]||'•'),
            React.createElement('span',{className:'historial-text'},React.createElement('strong',null,h.nombre),' — ',h.accion,' · ',h.fecha)
          );
        })
      )
    ),
    data.status==='revision'&&React.createElement(SendToClientBlock,{seccion:'medios',titulo:data.titular||'Artículo Medios'}),
    confirming&&React.createElement(ConfirmRow,{confirming,nameInput,setNameInput,onConfirm:handleConfirm,onCancel:function(){setConfirming(null);setNameInput('');}}),
    open&&React.createElement('div',null,
      // TITULARES
      React.createElement('div',{className:'medios-titulares'},
        React.createElement('div',{className:'medios-field medios-titular-main'},
          React.createElement('label',null,'Titular principal'),
          React.createElement('input',{type:'text',value:data.titular||'',onChange:function(e){onUpdate('titular',e.target.value);},placeholder:'Titular principal del artículo...'})
        ),
        React.createElement('div',{className:'medios-field medios-titular-opt'},
          React.createElement('label',null,'Titular alternativo 1 (opcional)'),
          React.createElement('input',{type:'text',value:data.titular2||'',onChange:function(e){onUpdate('titular2',e.target.value);},placeholder:'Segunda opción de titular...'})
        ),
        React.createElement('div',{className:'medios-field medios-titular-opt'},
          React.createElement('label',null,'Titular alternativo 2 (opcional)'),
          React.createElement('input',{type:'text',value:data.titular3||'',onChange:function(e){onUpdate('titular3',e.target.value);},placeholder:'Tercera opción de titular...'})
        )
      ),
      // TEXTO
      React.createElement('div',{className:'medios-field'},
        React.createElement('label',null,'Texto del artículo'),
        React.createElement('textarea',{value:data.texto||'',onChange:function(e){onUpdate('texto',e.target.value);},placeholder:'Redacción completa del artículo...'})
      ),
      // PALABRAS CLAVE
      React.createElement('div',{className:'medios-field'},
        React.createElement('label',null,'Palabras clave'),
        React.createElement('input',{type:'text',value:data.keywords||'',onChange:function(e){onUpdate('keywords',e.target.value);},placeholder:'interiorismo Madrid, cocinas de diseño, reforma integral...'})
      ),
      // CONTACTO + WEB
      React.createElement('div',{className:'medios-grid-2'},
        React.createElement('div',{className:'medios-field'},
          React.createElement('label',null,'Nombre persona de contacto'),
          React.createElement('input',{type:'text',value:data.contactoNombre||'',onChange:function(e){onUpdate('contactoNombre',e.target.value);},placeholder:'Nombre y apellidos...'})
        ),
        React.createElement('div',{className:'medios-field'},
          React.createElement('label',null,'Teléfono persona de contacto'),
          React.createElement('input',{type:'tel',value:data.contactoTel||'',onChange:function(e){onUpdate('contactoTel',e.target.value);},placeholder:'+34 600 000 000'})
        )
      ),
      React.createElement('div',{className:'medios-field'},
        React.createElement('label',null,'Web a enlazar'),
        React.createElement(UrlInput,{value:data.web||'',onChange:function(v){onUpdate('web',v);},placeholder:'https://docrysdc.es/...',variant:'rrss'})
      ),

// ── PDF EXPORT ─────────────────────────────────────────────────────────
function downloadFormPDF(title, subtitle, sections, filename){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210; const margin=18; const contentW=W-margin*2;
  let y=margin;

  // HEADER
  doc.setFillColor(13,13,13);
  doc.rect(0,0,W,28,'F');
  doc.setTextColor(201,168,76);
  doc.setFontSize(14);doc.setFont('helvetica','bold');
  doc.text('Los Martes No Hay Luna',margin,12);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.setTextColor(180,180,180);
  doc.text('Agencia de Marketing · Madrid · losmartesnohayluna.com',margin,19);
  y=36;

  // TITLE
  doc.setTextColor(13,13,13);
  doc.setFontSize(18);doc.setFont('helvetica','bold');
  doc.text(title,margin,y);y+=7;
  doc.setFontSize(10);doc.setFont('helvetica','normal');
  doc.setTextColor(100,100,100);
  doc.text(subtitle,margin,y);y+=3;

  // DIVIDER
  doc.setDrawColor(201,168,76);doc.setLineWidth(0.5);
  doc.line(margin,y+2,W-margin,y+2);y+=8;

  // DATE
  const fecha=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'});
  doc.setFontSize(8);doc.setTextColor(150,150,150);
  doc.text('Generado el '+fecha,margin,y);y+=8;

  sections.forEach(function(sec){
    // Section header
    if(y>260){doc.addPage();y=margin;}
    doc.setFillColor(245,240,232);
    doc.roundedRect(margin,y,contentW,8,1,1,'F');
    doc.setFontSize(9);doc.setFont('helvetica','bold');
    doc.setTextColor(139,105,20);
    doc.text(sec.emoji+' '+sec.titulo.toUpperCase(),margin+3,y+5.5);
    y+=12;

    sec.preguntas.forEach(function(q){
      if(y>265){doc.addPage();y=margin;}
      // Question
      doc.setFontSize(9);doc.setFont('helvetica','bold');
      doc.setTextColor(40,30,10);
      const qLines=doc.splitTextToSize(q.pregunta,contentW);
      doc.text(qLines,margin,y);
      y+=qLines.length*4.5+1;

      // Answer
      const answer=q.respuesta||(q.tipo==='valores'?q.respuesta:'Sin respuesta');
      doc.setFontSize(10);doc.setFont('helvetica','normal');
      doc.setTextColor(60,50,30);
      if(answer&&answer!=='Sin respuesta'){
        doc.setFillColor(255,253,247);
        const aLines=doc.splitTextToSize(answer,contentW-6);
        const boxH=aLines.length*5+5;
        if(y+boxH>275){doc.addPage();y=margin;}
        doc.roundedRect(margin,y,contentW,boxH,1,1,'F');
        doc.setDrawColor(201,168,76);doc.setLineWidth(0.3);
        doc.roundedRect(margin,y,contentW,boxH,1,1,'S');
        doc.text(aLines,margin+3,y+4);
        y+=boxH+5;
      } else {
        doc.setTextColor(180,180,180);
        doc.setFontSize(9);
        doc.text('—',margin+3,y);
        y+=6;
      }
      if(y>265){doc.addPage();y=margin;}
    });
    y+=3;
  });

  // FOOTER on each page
  const pages=doc.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);
    doc.setFillColor(13,13,13);
    doc.rect(0,287,W,10,'F');
    doc.setFontSize(7);doc.setFont('helvetica','normal');
    doc.setTextColor(150,150,150);
    doc.text('Los Martes No Hay Luna · Confidencial',margin,293);
    doc.text('Página '+i+' de '+pages,W-margin-15,293);
  }

  doc.save(filename);
}

function FormNegocio({data,onChange}){
  const d=data||{};
  const[open,setOpen]=useState(false);
  const[step,setStep]=useState(0);

  const totalPreguntas=NEGOCIO_STEPS.reduce(function(acc,s){return acc+s.preguntas.length;},0);
  const filled=NEGOCIO_STEPS.reduce(function(acc,s){
    return acc+s.preguntas.filter(function(p){return !!(d[p.key]&&String(d[p.key]).trim());}).length;
  },0);
  const pct=Math.round(filled/totalPreguntas*100);

  const current=NEGOCIO_STEPS[step];
  const isLast=step===NEGOCIO_STEPS.length-1;
  const stepFilled=current.preguntas.filter(function(p){return !!(d[p.key]&&String(d[p.key]).trim());}).length;

  return React.createElement('div',{className:'ob-form-card'},

          React.createElement('div',{className:'ob-form-card-title'},'Conociendo tu negocio'),
          React.createElement('div',{className:'ob-form-card-sub'},open?'Paso '+(step+1)+' de '+NEGOCIO_STEPS.length+' — '+current.titulo:'6 pasos · ~8 min · Todo lo que necesitamos saber')

      filled>0&&React.createElement('span',{className:'ob-form-progress'},pct+'% completado'),

function FormMarca({data,onChange}){
  const d=data||{};
  const[open,setOpen]=useState(false);
  const[step,setStep]=useState(0);
  const valores=d.valores||[];

  function toggleValor(id){
    const sel=valores.includes(id)?valores.filter(function(v){return v!==id;}):[...valores,id];
    if(sel.length<=3)onChange('valores',sel);
  }

  const totalPreguntas=MARCA_STEPS.reduce(function(acc,s){return acc+s.preguntas.length;},0);
  const filled=MARCA_STEPS.reduce(function(acc,s){
    return acc+s.preguntas.filter(function(p){
      if(p.tipo==='valores')return valores.length===3;
      return !!(d[p.key]&&String(d[p.key]).trim());
    }).length;
  },0);
  const pct=Math.round(filled/totalPreguntas*100);

  const current=MARCA_STEPS[step];
  const isLast=step===MARCA_STEPS.length-1;
  const stepFilled=current.preguntas.filter(function(p){
    if(p.tipo==='valores')return valores.length===3;
    return !!(d[p.key]&&String(d[p.key]).trim());
  }).length;

  return React.createElement('div',{className:'ob-form-card'},
    // HEADER
    React.createElement('div',{className:'ob-form-card-hdr'},
      React.createElement('div',{className:'ob-form-card-left'},
        React.createElement('span',{className:'ob-form-card-icon'},'🎨'),
        React.createElement('div',{className:'ob-form-card-info'},
          React.createElement('div',{className:'ob-form-card-title'},'Identidad de marca'),
          React.createElement('div',{className:'ob-form-card-sub'},open?'Paso '+(step+1)+' de '+MARCA_STEPS.length+' — '+current.titulo:'5 pasos · ~10 min · Metodología PQC')
        )
      ),
      filled>0&&React.createElement('span',{className:'ob-form-progress'},pct+'% completado'),
      React.createElement('button',{className:'ob-comenzar-btn'+(open?' open':''),onClick:function(){setOpen(function(o){return !o;});}},open?'Cerrar':'Comenzar')
    ),

    // PROGRESS BAR
    open&&React.createElement('div',{style:{height:3,background:'rgba(201,168,76,.12)'}},
      React.createElement('div',{style:{height:3,background:'linear-gradient(90deg,#c9a84c,#f0c96a)',width:((step/MARCA_STEPS.length*100))+'%',transition:'width .4s'}})
    ),

    // CONTENT
    open&&React.createElement('div',{className:'ob-form-body'},
      // STEP HEADER
      React.createElement('div',{className:'negocio-step-hdr'},
        React.createElement('div',{className:'negocio-step-emoji'},current.emoji),
        React.createElement('div',null,
          React.createElement('div',{className:'negocio-step-num'},'Paso '+(step+1)+' de '+MARCA_STEPS.length),
          React.createElement('div',{className:'negocio-step-title'},current.titulo),
          React.createElement('div',{className:'negocio-step-sub'},current.subtitulo)
        )
      ),

      // QUESTIONS
      React.createElement('div',{className:'negocio-questions'},
        current.preguntas.map(function(p){
          const isFilled=p.tipo==='valores'?valores.length===3:!!(d[p.key]&&String(d[p.key]).trim());
          return React.createElement('div',{key:p.key,className:'negocio-q'+(isFilled?' filled':'')},
            React.createElement('label',{className:'negocio-q-label'},isFilled?'✓ ':null,p.label),
            p.tip&&React.createElement('div',{className:'marca-q-tip'},'💡 ',p.tip),
            p.tipo==='valores'
              ?React.createElement('div',null,
                  React.createElement('div',{className:'marca-valores-counter',style:{color:valores.length===3?'#16a34a':'#b45309'}},
                    valores.length===3?'✅ 3 valores seleccionados':'Seleccionados: '+valores.length+'/3 — elige exactamente 3'
                  ),
                  React.createElement('div',{className:'marca-valores-grid'},
                    VALORES_LISTA.map(function(v){
                      const sel=valores.includes(v.id);
                      const disabled=!sel&&valores.length>=3;
                      return React.createElement('button',{
                        key:v.id,
                        className:'marca-valor-btn'+(sel?' sel':'')+(disabled?' disabled':''),
                        onClick:function(){if(!disabled)toggleValor(v.id);},
                        disabled:disabled
                      },
                        React.createElement('span',{className:'marca-valor-cat'},v.cat),
                        React.createElement('span',{className:'marca-valor-label'},v.label)
                      );
                    })
                  )
                )
              :p.tipo==='input'
                ?React.createElement('input',{className:'negocio-q-input',type:'text',value:d[p.key]||'',onChange:function(e){onChange(p.key,e.target.value);},placeholder:p.placeholder})
                :React.createElement('textarea',{className:'negocio-q-input',value:d[p.key]||'',onChange:function(e){onChange(p.key,e.target.value);},placeholder:p.placeholder,rows:4})
          );
        })
      ),

      // DOTS
      React.createElement('div',{className:'negocio-dots'},
        MARCA_STEPS.map(function(s,i){
          const isDone=MARCA_STEPS[i].preguntas.every(function(p){
            if(p.tipo==='valores')return valores.length===3;
            return !!(d[p.key]&&String(d[p.key]).trim());
          });
          return React.createElement('div',{key:i,className:'negocio-dot'+(i===step?' active':'')+(isDone?' done':'')});
        })
      ),

      // NAV
      React.createElement('div',{className:'negocio-nav'},
        step>0&&React.createElement('button',{className:'negocio-prev-btn',onClick:function(){setStep(function(s){return s-1;});}}, '← Anterior'),
        React.createElement('div',{style:{flex:1}}),
        stepFilled<current.preguntas.length&&React.createElement('span',{className:'negocio-nav-hint'},'Responde todas las preguntas para continuar'),
        !isLast
          ?React.createElement('button',{
              className:'negocio-next-btn'+(stepFilled<current.preguntas.length?' disabled':''),
              disabled:stepFilled<current.preguntas.length,
              onClick:function(){if(stepFilled>=current.preguntas.length)setStep(function(s){return s+1;});}
            },'Siguiente →')
          :React.createElement('button',{
              className:'negocio-next-btn done'+(stepFilled<current.preguntas.length?' disabled':''),
              disabled:stepFilled<current.preguntas.length,
              onClick:function(){if(stepFilled>=current.preguntas.length)setOpen(false);}
            },'¡Listo! Guardar respuestas ✓')
      ),

      pct===100&&React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10}},
        React.createElement('div',{className:'ob-form-completado'},'🎉 ¡Identidad de marca completada! Vuestra esencia está lista para trabajar.'),
        React.createElement('button',{
          className:'pdf-download-btn',
          onClick:function(){
            const valoresTexto=valores.map(function(id){
              const v=VALORES_LISTA.find(function(x){return x.id===id;});
              return v?v.cat+' — '+v.label:'';
            }).join(' | ');
            const allFields=[
              {key:'indignacion',label:'La gran indignación'},
              {key:'enemigo',label:'El enemigo compartido'},
              {key:'proposito',label:'El propósito superior'},
              {key:'vision',label:'Visión de marca'},
              {key:'comoDescribirte',label:'Personalidad de marca'},
              {key:'incoherencia',label:'La prueba de la incoherencia'},
            ];
            const sections=MARCA_STEPS.map(function(s){
              return {
                emoji:s.emoji, titulo:s.titulo,
                preguntas:s.preguntas.map(function(p){
                  const fieldDef=allFields.find(function(f){return f.key===p.key;});
                  const label=fieldDef?fieldDef.label:p.label;
                  const respuesta=p.tipo==='valores'?valoresTexto:(d[p.key]||'');
                  return {pregunta:label,respuesta:respuesta,tipo:p.tipo};
                })
              };
            });
            downloadFormPDF('Identidad de marca','Cuestionario estratégico PQC completado por el cliente',sections,'identidad-de-marca.pdf');
            const body=sections.map(function(s){return s.titulo+':\n'+s.preguntas.map(function(p){return '  '+p.pregunta+'\n  → '+(p.respuesta||'—');}).join('\n');}).join('\n\n');
            sendEmail('onboarding','formulario','Cliente Docrys & DC',new Date().toLocaleString('es-ES'),'Identidad de marca — '+body.substring(0,200));
          }
        },'⬇️ Descargar y enviar')
      ),
    )
  );
}

// ── MAIN APP ────────────────────────────────────────────────────────────
function App(){
  const[section,setSection]=useState('rrss');
  const[month,setMonth]=useState('2026-04');
  const[rrss,setRRSS]=useState(()=>loadRRSS());
  const[seo,setSEO]=useState(()=>loadSEO());
  const[pub,setPUB]=useState(()=>loadPUB());
  const[contact,setContact]=useState(()=>lsGet('contact')||{fiscal:{},contacts:[],files:[]});
  const[onboarding,setOnboarding]=useState(()=>lsGet('onboarding')||{checks:{},links:{},forms:{}});
  const[agency,setAgency]=useState(()=>lsGet('agency')||{});
  const[medios,setMedios]=useState(()=>{
    const d={};
    for(const m of MONTHS){
      const arr=lsGet('medios_'+m.key)||[];
      d[m.key]=arr.map(function(a){return {...a,status:a.status||'pendiente',historial:a.historial||[],revisionBy:a.revisionBy||'',revisionAt:a.revisionAt||'',approvedBy:a.approvedBy||'',approvedAt:a.approvedAt||''};});
    }
    return d;
  });
  const[pts,setPts]=useState(()=>loadPts());
  const[saved,setSaved]=useState(true);
  const[syncing,setSyncing]=useState(true);
  const timer=useRef(null);
  const[pubPlanLink,setPubPlanLink]=useState(()=>lsGet('pub_plan_link')||'');

  // Load from Supabase on mount
  useEffect(()=>{
    sbLoad().then(function(remote){
      if(remote){
        if(remote['contact'])setContact(remote['contact']);
        if(remote['onboarding'])setOnboarding(remote['onboarding']);
        if(remote['agency'])setAgency(remote['agency']);
        if(remote['pts'])setPts(remote['pts']);
        if(remote['pub_plan_link'])setPubPlanLink(remote['pub_plan_link']);
        const newRRSS=loadRRSS();
        for(const m of MONTHS){
          if(remote['rrss_'+m.key])newRRSS[m.key]=remote['rrss_'+m.key];
        }
        setRRSS(newRRSS);
        const newSEO=loadSEO();
        for(const m of MONTHS){
          if(remote['seo_'+m.key])newSEO[m.key]=remote['seo_'+m.key];
        }
        setSEO(newSEO);
        const newPUB=loadPUB();
        for(const m of MONTHS){
          if(remote['pub_'+m.key])newPUB[m.key]=remote['pub_'+m.key];
        }
        setPUB(newPUB);
        const newMedios={};
        for(const m of MONTHS){
          const arr=remote['medios_'+m.key]||lsGet('medios_'+m.key)||[];
          newMedios[m.key]=arr.map(function(a){return {...a,status:a.status||'pendiente',historial:a.historial||[],revisionBy:a.revisionBy||'',revisionAt:a.revisionAt||'',approvedBy:a.approvedBy||'',approvedAt:a.approvedAt||''};});
        }
        setMedios(newMedios);
      }
      setSyncing(false);
    });
  },[]);

  // autosave
  useEffect(()=>{
    setSaved(false);
    clearTimeout(timer.current);
    timer.current=setTimeout(()=>{
      for(const m of MONTHS){lsSet('rrss_'+m.key,rrss[m.key]);lsSet('seo_'+m.key,seo[m.key]);lsSet('pub_'+m.key,pub[m.key]);lsSet('medios_'+m.key,medios[m.key]);}
      lsSet('pts',pts); lsSet('contact',contact); lsSet('onboarding',onboarding); lsSet('agency',agency);
      // Sync to Supabase
      const snapshot={contact,onboarding,agency,pts};
      for(const m of MONTHS){snapshot['rrss_'+m.key]=rrss[m.key];snapshot['seo_'+m.key]=seo[m.key];snapshot['pub_'+m.key]=pub[m.key];snapshot['medios_'+m.key]=medios[m.key];}
      sbSave(snapshot);
      setSaved(true);
    },800);
  },[rrss,seo,pub,pts,contact,onboarding,agency,medios]);

  useEffect(()=>{lsSet('pub_plan_link',pubPlanLink);},[pubPlanLink]);

  // ── approve handler (shared)
  function doApprove(){
    setPts(p=>p+5);
    showToast();
  }

  // ── RRSS handlers
  const updateRRSS=useCallback((mk,wi,plat,pi,f,v)=>{
    setRRSS(prev=>{const n=JSON.parse(JSON.stringify(prev));if(n[mk]?.[wi]?.[plat]?.[pi])n[mk][wi][plat][pi][f]=v;return n;});
  },[]);
  const addCustomRRSS=useCallback((mk,wi,plat,type)=>{
    setRRSS(prev=>{const n=JSON.parse(JSON.stringify(prev));if(!n[mk][wi].customIg)n[mk][wi].customIg=[];n[mk][wi].customIg.push({type,topic:'',text:'',hashtags:DEFAULT_HASHTAGS,link:'',date:'',status:'pendiente'});return n;});
  },[]);
  const updateCustomRRSS=useCallback((mk,wi,plat,ci,f,v)=>{
    setRRSS(prev=>{const n=JSON.parse(JSON.stringify(prev));if(n[mk][wi].customIg?.[ci])n[mk][wi].customIg[ci][f]=v;return n;});
  },[]);
  const deleteCustomRRSS=useCallback((mk,wi,plat,ci)=>{
    setRRSS(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk][wi].customIg.splice(ci,1);return n;});
  },[]);
  const approveRRSS=useCallback((mk,wi,plat,pi,isCustom)=>{
    doApprove();
    setRRSS(prev=>{const n=JSON.parse(JSON.stringify(prev));
      if(isCustom){if(n[mk][wi].customIg?.[pi])n[mk][wi].customIg[pi].status='aprobado';}
      else{if(n[mk][wi][plat]?.[pi])n[mk][wi][plat][pi].status='aprobado';}
      return n;});
  },[pts]);

  // ── SEO handlers
  const updateSEOArticle=useCallback((mk,i,f,v)=>{
    setSEO(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].articles[i][f]=v;return n;});
  },[]);
  const updateSEOReport=useCallback((mk,v)=>{
    setSEO(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].reportLink=v;return n;});
  },[]);
  const updateSEOSeoTecnico=useCallback((mk,v)=>{
    setSEO(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].cambiosSeoTecnico=v;return n;});
  },[]);
  const addSEOArticle=useCallback((mk)=>{
    setSEO(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].articles.push({title:'',kw:'',type:'Blog',notas:'',linkArticulo:'',date:'',status:'pendiente'});return n;});
  },[]);
  const deleteSEOArticle=useCallback((mk,i)=>{
    setSEO(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].articles.splice(i,1);return n;});
  },[]);
  const approveSEO=useCallback((mk,i)=>{
    doApprove();
    setSEO(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].articles[i].status='aprobado';return n;});
  },[pts]);

  // ── PUB handlers
  const updatePubCampaign=useCallback((mk,i,f,v)=>{
    setPUB(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].campaigns[i][f]=v;return n;});
  },[]);
  const updatePubReport=useCallback((mk,v)=>{
    setPUB(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].reportLink=v;return n;});
  },[]);
  const addPubCampaign=useCallback((mk)=>{
    setPUB(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].campaigns.push({name:'Nueva campaña',platform:'meta',objetivo:'',budget:'',linkCampana:'',reportLink:'',status:'pendiente'});return n;});
  },[]);
  const deletePubCampaign=useCallback((mk,i)=>{
    setPUB(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].campaigns.splice(i,1);return n;});
  },[]);
  const approvePub=useCallback((mk,i)=>{
    doApprove();
    setPUB(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].campaigns[i].status='aprobado';return n;});
  },[pts]);

  const updateAgency=useCallback(function(id,field,val){setAgency(prev=>{const n=JSON.parse(JSON.stringify(prev));if(!n[id])n[id]={};n[id][field]=val;return n;});  },[]);

  // ── MEDIOS handlers
  const updateMediosArticle=useCallback(function(mk,i,f,v){setMedios(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk][i][f]=v;return n;});  },[]);
  const addMediosArticle=useCallback(function(mk){setMedios(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk]=[...(n[mk]||[]),{id:Date.now(),titular:'',titular2:'',titular3:'',texto:'',keywords:'',contactoNombre:'',contactoTel:'',web:'',foto1:'',foto2:'',foto3:'',fotoSeleccionada:undefined,status:'pendiente',revisionBy:'',revisionAt:'',approvedBy:'',approvedAt:'',revisionNum:0,historial:[]}];return n;});  },[]);
  const deleteMediosArticle=useCallback(function(mk,i){setMedios(prev=>{const n=JSON.parse(JSON.stringify(prev));n[mk].splice(i,1);return n;});  },[]);
  const approveMedios=useCallback(function(mk,i){setPts(function(p){return p+5;});  },[]);

  const toggleOnboarding=useCallback(function(id){setOnboarding(prev=>{const n=JSON.parse(JSON.stringify(prev));n.checks[id]=!n.checks[id];return n;});  },[]);
  const updateOnboardingLink=useCallback(function(key,val){setOnboarding(prev=>{const n=JSON.parse(JSON.stringify(prev));n.links[key]=val;return n;});  },[]);
  const updateOnboardingForm=useCallback(function(formKey,field,val){setOnboarding(prev=>{const n=JSON.parse(JSON.stringify(prev));if(!n.forms)n.forms={};if(!n.forms[formKey])n.forms[formKey]={};n.forms[formKey][field]=val;return n;});  },[]);

  // ── CONTACT handlers
  const updateFiscal=useCallback(function(f,v){setContact(prev=>{const n=JSON.parse(JSON.stringify(prev));n.fiscal[f]=v;return n;});  },[]);
  const updateContactPerson=useCallback(function(i,f,v){setContact(prev=>{const n=JSON.parse(JSON.stringify(prev));n.contacts[i][f]=v;return n;});  },[]);
  const addContactPerson=useCallback(function(){setContact(prev=>{const n=JSON.parse(JSON.stringify(prev));n.contacts.push({nombre:'',puesto:'',email:'',telefono:''});return n;});  },[]);
  const deleteContactPerson=useCallback(function(i){setContact(prev=>{const n=JSON.parse(JSON.stringify(prev));n.contacts.splice(i,1);return n;});  },[]);
  const addFile=useCallback(function(){setContact(prev=>{const n=JSON.parse(JSON.stringify(prev));if(!n.files)n.files=[];n.files.push({nombre:'',categoria:'',url:'',descripcion:''});return n;});  },[]);
  const updateFile=useCallback(function(i,f,v){setContact(prev=>{const n=JSON.parse(JSON.stringify(prev));if(n.files&&n.files[i])n.files[i][f]=v;return n;});  },[]);
  const deleteFile=useCallback(function(i){setContact(prev=>{const n=JSON.parse(JSON.stringify(prev));if(n.files)n.files.splice(i,1);return n;});  },[]);

  // ── STATS
  if(syncing)return React.createElement('div',{style:{
    position:'fixed',inset:0,background:'#1a0a2e',display:'flex',flexDirection:'column',
    alignItems:'center',justifyContent:'center',gap:16,zIndex:9999

        planWeek:PLAN_RRSS[month][wi],
        dataWeek:mDataR[wi]||{ig:[],customIg:[]},
        onUpdate:(plat,pi,f,v)=>updateRRSS(month,wi,plat,pi,f,v),
        onAddCustom:(plat,type)=>addCustomRRSS(month,wi,plat,type),
        onUpdateCustom:(plat,ci,f,v)=>updateCustomRRSS(month,wi,plat,ci,f,v),
        onDeleteCustom:(plat,ci)=>deleteCustomRRSS(month,wi,plat,ci),
        onApprove:(plat,pi)=>approveRRSS(month,wi,plat==='custom'?'customIg':plat,pi,plat==='custom'),
        defOpen:wi===0,
      })),

      // ── SEO CONTENT
      section==='seo'&&React.createElement(SEOMonth,{
        mk:month,monthData:mDataS,monthName:mo.name,
        onUpdateArticle:(i,f,v)=>updateSEOArticle(month,i,f,v),
        onUpdateReport:(v)=>updateSEOReport(month,v),
        onUpdateSeoTecnico:(v)=>updateSEOSeoTecnico(month,v),
        onAddArticle:()=>addSEOArticle(month),
        onDeleteArticle:(i)=>deleteSEOArticle(month,i),
        onApprove:(i)=>approveSEO(month,i),
      }),

      // ── PUBLICIDAD CONTENT
      section==='pub'&&React.createElement('div',{className:'pub-section'},
        // Plan publicitario global
        React.createElement('div',{className:'pub-plan-banner'},
          React.createElement('span',{className:'pub-plan-icon'},'📋'),
          React.createElement('div',{className:'pub-plan-info'},
            React.createElement('div',{className:'pub-plan-title'},'Plan Publicitario Global'),
            React.createElement('div',{className:'pub-plan-sub'},'Enlace al documento maestro con la estrategia y planificación de publicidad')
          ),
          React.createElement(UrlInput,{value:pubPlanLink,onChange:v=>setPubPlanLink(v),placeholder:'https://docs.google.com/...',className:'pub-plan-input',variant:'pub'})
        ),
        React.createElement(PubMonth,{
          mk:month,monthData:mDataP,monthName:mo.name,
          onUpdateCampaign:(i,f,v)=>updatePubCampaign(month,i,f,v),
          onUpdateReport:(v)=>updatePubReport(month,v),
          onAddCampaign:()=>addPubCampaign(month),
          onDeleteCampaign:(i)=>deletePubCampaign(month,i),
          onApprove:(i)=>approvePub(month,i),
        })
      ),

      // ── MEDIOS DIGITALES CONTENT
      section==='medios'&&React.createElement(MediosSection,{
        data:medios[month]||[],
        onUpdateArticle:function(i,f,v){updateMediosArticle(month,i,f,v);},
        onAddArticle:function(){addMediosArticle(month);},
        onDeleteArticle:function(i){deleteMediosArticle(month,i);},
        onApprove:function(i){approveMedios(month,i);},
      }),

      // ── AGENCIA CONTENT
      section==='agencia'&&React.createElement(AgencySection,{
        data:agency,
        onUpdate:updateAgency,
      }),

      // ── ONBOARDING CONTENT
      section==='onboarding'&&React.createElement(OnboardingSection,{
        data:onboarding,
        onToggle:toggleOnboarding,
        onUpdateLink:updateOnboardingLink,
        onUpdateForm:updateOnboardingForm,
      }),

      // ── CONTACTO CONTENT
      section==='contacto'&&React.createElement(ContactSection,{
        data:contact,
        onUpdateFiscal:updateFiscal,
        onUpdateContact:updateContactPerson,
        onAddContact:addContactPerson,
        onDeleteContact:deleteContactPerson,
        onAddFile:addFile,
        onUpdateFile:updateFile,
        onDeleteFile:deleteFile,
      }),

      React.createElement('div',{className:'footer'},
        React.createElement('span',{className:'ft-l'},'Docrys & DC · Plan Digital Abr–Dic 2026'),
        React.createElement('span',{className:'ft-r'},'🏆 '+pts+' puntos acumulados')
      )
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
