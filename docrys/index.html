/* HEADER */

.hdr-title{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1.2}
.hdr-stats{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.stat{text-align:center;min-width:40px}
.stat-n{font-size:18px;font-weight:700;line-height:1}
.stat-l{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:2px}
.save-badge{font-size:10px;padding:3px 8px;border-radius:10px;letter-spacing:.06em;background:rgba(255,255,255,.08)}

.pts-n{font-size:14px;font-weight:800;color:#0d0d0d;line-height:1}
.pts-l{font-size:9px;font-weight:700;color:rgba(0,0,0,.6);letter-spacing:.1em;text-transform:uppercase}

.level-bar{background:rgba(255,255,255,.08);border-radius:4px;height:4px;margin-bottom:2px;overflow:hidden;width:80px}
.level-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#f0c96a);border-radius:4px;transition:width .5s ease}
.level-label{font-size:9px;color:rgba(255,255,255,.4);letter-spacing:.08em}

.tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 14px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.35);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.on{color:#c9a84c;border-bottom-color:#c9a84c}
.prog{height:3px;background:rgba(0,0,0,.1)}

.mth-name{font-size:18px;font-weight:700;color:#0d0d0d;letter-spacing:-.02em}
.mth-sub{font-size:11px;color:#6b5f4e;letter-spacing:.06em;margin-top:1px}

.plat-count{font-size:10px;color:#6b5f4e;margin-left:auto;letter-spacing:.06em}

.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:#0d0d0d;color:#c9a84c;font-family:Poppins,sans-serif;font-size:13px;font-weight:600;padding:10px 20px;border-radius:30px;border:1.5px solid #c9a84c;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:toastUp .6s ease forwards;white-space:nowrap;letter-spacing:.04em}
@keyframes toastUp{
  0%{opacity:0;transform:translateY(20px) scale(.92)}
  20%{opacity:1;transform:translateY(0) scale(1)}
  70%{opacity:1;transform:translateY(-6px) scale(1)}
  100%{opacity:0;transform:translateY(-30px) scale(.95)}
}

/* CONFETTI */
.confetti-piece{position:fixed;top:0;width:10px;height:10px;border-radius:2px;animation:confettiFall 1.2s ease-in forwards;pointer-events:none;z-index:9998}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* POINTS PANEL */
.pts-panel{background:#0d0d0d;border:1.5px solid #c9a84c;border-radius:12px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}

@media(max-width:500px){

  .pts-big{font-size:26px}

// ── LOCAL STORAGE ─────────────────────────────────────────────────────
const LS='docrys26v2_';
function emptyPost(type){return {type,topic:'',text:'',hashtags:DEFAULT_HASHTAGS,link:'',date:'',status:'pendiente'};}

function buildDefault(){
  const s={};
  for(const m of MONTHS){
    s[m.key]=PLAN[m.key].map(w=>({
      ig:w.ig.map(c=>({topic:c.topic,text:'',hashtags:DEFAULT_HASHTAGS,link:'',date:'',status:'pendiente'})),
      customIg:[],
    }));
  }
  return s;
}

function loadLS(){
  const d=buildDefault();
  for(const m of MONTHS){
    try{
      const r=localStorage.getItem(LS+m.key);
      if(r){
        const p=JSON.parse(r);
        d[m.key]=p.map((w,wi)=>({
          ig:(w.ig||[]).map((s,i)=>({
            topic:s.topic!==undefined?s.topic:(PLAN[m.key][wi]?.ig[i]?.topic||''),
            text:s.text||'',hashtags:s.hashtags||DEFAULT_HASHTAGS,
            link:s.link||'',date:s.date||'',status:s.status||'pendiente'
          })),
          customIg:w.customIg||[],
        }));
      }
    }catch(e){}
  }
  return d;
}

function loadPts(){try{return parseInt(localStorage.getItem('docrys_pts')||'0',10);}catch(e){return 0;}}
function savePts(p){try{localStorage.setItem('docrys_pts',p);}catch(e){}}

function saveLS(state){
  for(const m of MONTHS){
    try{localStorage.setItem(LS+m.key,JSON.stringify(state[m.key]));}catch(e){}
  }
}

function AddButton({onAdd}){
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    function h(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);
  return React.createElement('div',{className:'add-post-wrap',ref},
    React.createElement('button',{className:'add-post-btn',onClick:()=>setOpen(o=>!o)},
      React.createElement('span',{className:'add-icon'},'+'),
      'Añadir publicación'
    ),
    open&&React.createElement('div',{className:'dropdown'},
      React.createElement('div',{className:'dd-title'},'Tipo de publicación'),
      ADD_TYPES.map(o=>React.createElement('button',{key:o.type,className:'dd-opt',onClick:()=>{onAdd(o.type);setOpen(false);}},
        React.createElement('span',{className:'dd-dot',style:{background:o.dot}}),
        o.label
      ))
    )
  );
}

function PostCard({planCfg,data,onUpdate,onDelete,onApprove}){
  const type=planCfg?planCfg.type:(data.type||'reel');
  const t=TC[type]||TC.reel;
  const s=SC[data.status]||SC.pendiente;
  const pillar=planCfg?planCfg.pillar:(data.pillar||'');
  const isApproved=data.status==='aprobado';

  function handleStatus(){
    if(s.next==='aprobado') onApprove();
    else onUpdate('status',s.next);
  }

  return React.createElement('div',{className:'card'+(isApproved?' approved':''),style:{borderLeftColor:isApproved?'#22c55e':t.border}},
    // TOP ROW
    React.createElement('div',{className:'card-top'},
      React.createElement('div',{className:'card-badges'},
        React.createElement('span',{className:'type-badge',style:{color:t.color,background:t.bg}},t.label),
        pillar&&React.createElement('span',{className:'pillar-tag'},pillar)
      ),
      React.createElement('div',{style:{display:'flex',gap:6,alignItems:'center'}},
        React.createElement('button',{className:'st-btn',style:{background:s.bg,color:s.color,borderColor:s.bc},onClick:handleStatus},s.label),
        onDelete&&React.createElement('button',{className:'del-btn',onClick:onDelete,title:'Eliminar'},'✕')
      )
    ),
    // TOPIC
    React.createElement('div',null,
      React.createElement('label',{className:'field-label'},'Tema — editable'),
      React.createElement('input',{className:'topic-input',type:'text',value:data.topic,onChange:e=>onUpdate('topic',e.target.value),placeholder:'Escribe o edita el tema del post...'})
    ),
    // COPY
    React.createElement('div',null,
      React.createElement('label',{className:'field-label'},'Copy del post'),
      React.createElement('textarea',{className:'post-textarea',value:data.text,onChange:e=>onUpdate('text',e.target.value),placeholder:'Escribe aquí el texto principal del post...'}),
      React.createElement('div',{className:'firma-box'},FIRMA)
    ),
    // HASHTAGS
    React.createElement('div',null,
      React.createElement('label',{className:'field-label'},'Hashtags'),
      React.createElement('textarea',{className:'hashtag-textarea',value:data.hashtags||DEFAULT_HASHTAGS,onChange:e=>onUpdate('hashtags',e.target.value),placeholder:'#DocrysDC #DiseñoDeInteriores ...'})
    ),
    // DATE + LINK stacked
    React.createElement('div',{className:'fields-stack'},
      React.createElement('div',null,
        React.createElement('label',{className:'field-label'},'Día de publicación'),
        React.createElement('input',{className:'date-input',type:'date',value:data.date||'',onChange:e=>onUpdate('date',e.target.value)})
      ),

function WeekSection({mk,wi,weekLabel,planWeek,dataWeek,onUpdate,onAddCustom,onUpdateCustom,onDeleteCustom,onApprove,defOpen}){
  const[open,setOpen]=useState(defOpen);
  const allData=[...dataWeek.ig,...(dataWeek.customIg||[])];
  const apr=allData.filter(d=>d.status==='aprobado').length;
  const rev=allData.filter(d=>d.status==='revision').length;

      ),
      React.createElement('div',{className:'posts-grid'},
        planWeek.ig.map((cfg,i)=>React.createElement(PostCard,{
          key:'ig'+i,planCfg:cfg,
          data:{...dataWeek.ig[i],topic:dataWeek.ig[i]?.topic!==undefined?dataWeek.ig[i].topic:cfg.topic},
          onUpdate:(f,v)=>onUpdate('ig',i,f,v),
          onApprove:()=>onApprove('ig',i),
        })),
        (dataWeek.customIg||[]).map((item,i)=>React.createElement(PostCard,{
          key:'cig'+i,planCfg:null,data:item,
          onUpdate:(f,v)=>onUpdateCustom('ig',i,f,v),

          onApprove:()=>onApprove('custom',i),
        }))
      ),
      React.createElement(AddButton,{onAdd:type=>onAddCustom('ig',type)})

function App(){
  const[month,setMonth]=useState('2026-04');
  const[state,setState]=useState(()=>loadLS());
  const[saved,setSaved]=useState(true);
  const[pts,setPts]=useState(()=>loadPts());
  const[showPtsPanel,setShowPtsPanel]=useState(false);
  const timer=useRef(null);
  const toastCount=useRef(0);

  useEffect(()=>{
    setSaved(false);
    if(timer.current)clearTimeout(timer.current);
    timer.current=setTimeout(()=>{saveLS(state);setSaved(true);},800);
    return()=>clearTimeout(timer.current);
  },[state]);

  useEffect(()=>{savePts(pts);},[pts]);

  const approve=useCallback((mk,wi,plat,pi,isCustom)=>{
    const newPts=pts+10;
    setPts(newPts);
    const idx=toastCount.current%TOAST_MESSAGES.length;
    toastCount.current++;
    const[msg,sub]=TOAST_MESSAGES[idx];
    showToast(msg,sub);
    setState(prev=>{
      const n=JSON.parse(JSON.stringify(prev));
      if(isCustom){
        if(n[mk][wi].customIg[pi])n[mk][wi].customIg[pi].status='aprobado';
      } else {
        if(n[mk][wi][plat][pi])n[mk][wi][plat][pi].status='aprobado';
      }
      return n;
    });
  },[pts]);

  const update=useCallback((mk,wi,plat,pi,field,val)=>{
    setState(prev=>{
      const n=JSON.parse(JSON.stringify(prev));
      if(n[mk]&&n[mk][wi]&&n[mk][wi][plat]&&n[mk][wi][plat][pi])n[mk][wi][plat][pi][field]=val;
      return n;
    });
  },[]);

  const addCustom=useCallback((mk,wi,plat,type)=>{
    setState(prev=>{
      const n=JSON.parse(JSON.stringify(prev));
      if(!n[mk][wi].customIg)n[mk][wi].customIg=[];
      n[mk][wi].customIg.push(emptyPost(type));
      return n;
    });
  },[]);

  const updateCustom=useCallback((mk,wi,plat,ci,field,val)=>{
    setState(prev=>{
      const n=JSON.parse(JSON.stringify(prev));
      if(n[mk][wi].customIg&&n[mk][wi].customIg[ci])n[mk][wi].customIg[ci][field]=val;
      return n;
    });
  },[]);

  const deleteCustom=useCallback((mk,wi,plat,ci)=>{
    setState(prev=>{
      const n=JSON.parse(JSON.stringify(prev));
      if(n[mk][wi].customIg)n[mk][wi].customIg.splice(ci,1);
      return n;
    });
  },[]);

  const mData=state[month]||[];
  const all=mData.flatMap(w=>[...w.ig,...(w.customIg||[])]);
  const apr=all.filter(p=>p.status==='aprobado').length;
  const rev=all.filter(p=>p.status==='revision').length;
  const pct=all.length>0?Math.round((apr/all.length)*100):0;
  const gAll=Object.values(state).flatMap(mw=>mw.flatMap(w=>[...w.ig,...(w.customIg||[])]));
  const gApr=gAll.filter(p=>p.status==='aprobado').length;
  const mo=MONTHS.find(m=>m.key===month);
  const lv=getLevel(pts);
  const nextLv=LEVELS[LEVELS.indexOf(lv)+1];
  const lvPct=nextLv?Math.round(((pts-lv.min)/(nextLv.min-lv.min))*100):100;

  return React.createElement('div',null,
    // HEADER
    React.createElement('div',{className:'hdr'},
      React.createElement('div',{className:'hdr-top'},
        React.createElement('div',{className:'hdr-brand'},
          React.createElement('div',{className:'hdr-eyebrow'},'Docrys & DC · LMNHL'),
          React.createElement('div',{className:'hdr-title'},'Plan Instagram 2026')
        ),
        React.createElement('div',{className:'hdr-stats'},
          React.createElement('div',{className:'stat'},React.createElement('div',{className:'stat-n',style:{color:'#4ade80'}},apr),React.createElement('div',{className:'stat-l'},'Aprob. mes')),
          React.createElement('div',{className:'stat'},React.createElement('div',{className:'stat-n',style:{color:'#fbbf24'}},rev),React.createElement('div',{className:'stat-l'},'Revisión')),
          React.createElement('div',{className:'stat'},React.createElement('div',{className:'stat-n',style:{color:'#c9a84c'}},gApr),React.createElement('div',{className:'stat-l'},'Total ✓')),
          // POINTS BADGE
          React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}},
            React.createElement('div',{className:'pts-badge',onClick:()=>setShowPtsPanel(p=>!p),title:'Ver nivel'},
              React.createElement('span',{className:'pts-icon'},'🏆'),
              React.createElement('div',null,
                React.createElement('div',{className:'pts-n'},pts),
                React.createElement('div',{className:'pts-l'},'puntos')
              )
            ),
            React.createElement('div',{style:{textAlign:'right'}},
              React.createElement('div',{className:'level-bar'},React.createElement('div',{className:'level-fill',style:{width:lvPct+'%'}})),
              React.createElement('div',{className:'level-label'},lv.name)
            )
          ),
          React.createElement('span',{className:'save-badge',style:{color:saved?'#4ade80':'#fbbf24'}},saved?'● Guardado':'● Guardando...')
        )
      ),
      React.createElement('div',{className:'tabs'},
        MONTHS.map(m=>React.createElement('button',{key:m.key,className:'tab '+(m.key===month?'on':''),onClick:()=>setMonth(m.key)},m.name))
      )
    ),
    React.createElement('div',{className:'prog'},React.createElement('div',{className:'prog-bar',style:{width:pct+'%'}})),

    React.createElement('div',{className:'body'},
      // POINTS PANEL
      showPtsPanel&&React.createElement('div',{className:'pts-panel'},
        React.createElement('div',{className:'pts-big'},pts),
        React.createElement('div',{className:'pts-info'},
          React.createElement('div',{className:'pts-info-title'},'Tus puntos de contenido'),
          React.createElement('div',{className:'pts-info-sub'},gApr+' posts aprobados · 10 pts cada uno')
        ),
        React.createElement('div',{className:'level-wrap'},
          React.createElement('span',{className:'level-badge',style:{background:lv.bg,color:lv.color}},lv.name),
          nextLv&&React.createElement('div',{style:{fontSize:10,color:'rgba(255,255,255,.4)',marginTop:4}},
            'Faltan '+(nextLv.min-pts)+' pts para: '+nextLv.name
          )
        ),
        React.createElement('button',{onClick:()=>setShowPtsPanel(false),style:{background:'none',border:'none',color:'rgba(255,255,255,.3)',cursor:'pointer',fontSize:18,padding:'4px'}},'✕')
      ),

      // MONTH HEADER
      React.createElement('div',{className:'mth-hd'},
        React.createElement('div',{className:'mth-accent'}),
        React.createElement('div',null,
          React.createElement('div',{className:'mth-name'},mo.name+' 2026'),
          React.createElement('div',{className:'mth-sub'},pct+'% completado · '+(mo.weeks.length*4)+' posts base')
        )
      ),

      // WEEKS
      mo.weeks.map((wl,wi)=>React.createElement(WeekSection,{
        key:wi,mk:month,wi,
        weekLabel:'Semana '+(wi+1)+' — '+wl,
        planWeek:PLAN[month][wi],
        dataWeek:mData[wi]||{ig:[],customIg:[]},
        onUpdate:(plat,pi,f,v)=>update(month,wi,plat,pi,f,v),
        onAddCustom:(plat,type)=>addCustom(month,wi,plat,type),
        onUpdateCustom:(plat,ci,f,v)=>updateCustom(month,wi,plat,ci,f,v),
        onDeleteCustom:(plat,ci)=>deleteCustom(month,wi,plat,ci),
        onApprove:(plat,pi)=>{
          const isCustom=plat==='custom';
          approve(month,wi,isCustom?'customIg':'ig',pi,isCustom);
        },
        defOpen:wi===0,
      })),

      React.createElement('div',{className:'footer'},
        React.createElement('span',{className:'ft-l'},'Docrys & DC · Plan Instagram Abr–Dic 2026 · 144 posts base'),
        React.createElement('span',{className:'ft-r'},'🏆 '+pts+' pts · '+lv.name)
      )
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
