const LS='lmnhl26_';

function emptyPost(type){ return {type,topic:'',text:'',link:'',date:'',status:'pendiente'}; }

function buildDefault(){
  const s={};
  for(const m of MONTHS){
    s[m.key]=PLAN[m.key].map(w=>({
      ig:w.ig.map(c=>({topic:c.topic,text:'',link:'',date:'',status:'pendiente'})),
      li:w.li.map(c=>({topic:c.topic,text:'',link:'',date:'',status:'pendiente'})),
      customIg:[],
      customLi:[],
    }));
  }
  return s;
}

function loadLS(){
  const d=buildDefault();
  for(const m of MONTHS){
    try{
      const r=localStorage.getItem(LS+m.key);
      if(r){
        const p=JSON.parse(r);
        d[m.key]=p.map((w,wi)=>({
          ig:(w.ig||[]).map((s,i)=>({topic:s.topic!==undefined?s.topic:(PLAN[m.key][wi]?.ig[i]?.topic||''),text:s.text||'',link:s.link||'',date:s.date||'',status:s.status||'pendiente'})),
          li:(w.li||[]).map((s,i)=>({topic:s.topic!==undefined?s.topic:(PLAN[m.key][wi]?.li[i]?.topic||''),text:s.text||'',link:s.link||'',date:s.date||'',status:s.status||'pendiente'})),
          customIg:w.customIg||[],
          customLi:w.customLi||[],
        }));
      }
    }catch(e){}
  }
  return d;
}

function saveLS(state){
  for(const m of MONTHS){
    try{localStorage.setItem(LS+m.key,JSON.stringify(state[m.key]));}catch(e){}
  }
}

function AddButton({plat,onAdd}){
  const[open,setOpen]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{
    function h(e){if(ref.current&&!ref.current.contains(e.target))setOpen(false);}
    document.addEventListener('mousedown',h);
    return()=>document.removeEventListener('mousedown',h);
  },[]);
  return React.createElement('div',{className:'add-post-wrap',ref},
    React.createElement('button',{
      className:'add-post-btn '+(plat==='ig'?'ig':''),
      onClick:()=>setOpen(o=>!o)
    },
      React.createElement('span',{className:'add-icon'},'+'),
      'Nueva publicación'
    ),
    open&&React.createElement('div',{className:'dropdown '+(plat==='li'?'right':'')},
      React.createElement('div',{className:'dd-title'},'Tipo de publicación'),
      ADD_TYPES.map(o=>React.createElement('button',{
        key:o.type,className:'dd-opt',
        onClick:()=>{onAdd(o.type);setOpen(false);}
      },
        React.createElement('span',{className:'dd-dot',style:{background:o.dot}}),
        o.label
      ))
    )
  );
}

function PostCard({planCfg,data,onUpdate,onDelete}){
  const type=planCfg?planCfg.type:(data.type||'post');
  const t=TC[type]||TC.post;
  const s=SC[data.status]||SC.pendiente;
  const pillar=planCfg?planCfg.pillar:(data.pillar||'');
  return React.createElement('div',{className:'card',style:{borderLeftColor:t.border}},
    React.createElement('div',{className:'card-top'},
      React.createElement('div',{className:'card-badges'},
        React.createElement('span',{className:'type-badge',style:{color:t.color,background:t.bg}},t.label),
        pillar&&React.createElement('span',{className:'pillar-tag'},pillar)
      ),
      React.createElement('div',{style:{display:'flex',gap:6,alignItems:'center'}},
        React.createElement('button',{className:'st-btn',style:{background:s.bg,color:s.color,borderColor:s.bc},onClick:()=>onUpdate('status',s.next)},s.label),
        onDelete&&React.createElement('button',{className:'del-btn',onClick:onDelete},'✕')
      )
    ),
    React.createElement('div',null,
      React.createElement('div',{className:'topic-hint'},'Tema — editable'),
      React.createElement('input',{
        className:'topic-input',
        type:'text',
        value:data.topic,
        onChange:e=>onUpdate('topic',e.target.value),
        placeholder:'Escribe o edita el tema del post...'
      })
    ),
    React.createElement('textarea',{className:'post-textarea',value:data.text,onChange:e=>onUpdate('text',e.target.value),placeholder:'Texto del post...'}),
    React.createElement('div',{style:{display:'flex',gap:10}},
      React.createElement('div',{style:{flex:'0 0 160px'}},
        React.createElement('label',{className:'date-label'},'Día de publicación'),
        React.createElement('input',{className:'date-input',type:'date',value:data.date||'',onChange:e=>onUpdate('date',e.target.value)})
      ),
      React.createElement('div',{style:{flex:1}},
        React.createElement('label',{className:'date-label'},'Enlace a carpeta / vídeo / diseño'),
        React.createElement('input',{className:'link-input',type:'text',value:data.link,onChange:e=>onUpdate('link',e.target.value),placeholder:'https://drive.google.com/...'})
      )
    )
  );
}

function WeekSection({mk,wi,weekLabel,planWeek,dataWeek,onUpdate,onUpdateTopic,onAddCustom,onUpdateCustom,onDeleteCustom,defOpen}){
  const[open,setOpen]=useState(defOpen);
  const allData=[...dataWeek.ig,...dataWeek.li,...(dataWeek.customIg||[]),...(dataWeek.customLi||[])];
  const apr=allData.filter(d=>d.status==='aprobado').length;
  const rev=allData.filter(d=>d.status==='revision').length;
  return React.createElement('div',{className:'week'},
    React.createElement('button',{className:'week-hdr '+(open?'on':''),onClick:()=>setOpen(o=>!o)},
      React.createElement('div',{className:'wk-left'},
        React.createElement('span',{className:'wk-label'},weekLabel),
        React.createElement('div',{className:'wk-badges'},
          apr>0&&React.createElement('span',{className:'wbadge apr'},apr+' aprobados'),
          rev>0&&React.createElement('span',{className:'wbadge rev'},rev+' en revisión'),
          React.createElement('span',{className:'wbadge tot'},(planWeek.ig.length+planWeek.li.length+(dataWeek.customIg||[]).length+(dataWeek.customLi||[]).length)+' posts')
        )
      ),
      React.createElement('span',{className:'wk-arrow'},open?'▲':'▼')
    ),
    open&&React.createElement('div',{className:'week-body'},
      React.createElement('div',{className:'platform'},
        React.createElement('div',{className:'plat-hdr'},
          React.createElement('span',{style:{fontSize:14,marginRight:4}},'📸'),
          React.createElement('span',{className:'plat-name'},'Instagram'),
          React.createElement('span',{className:'plat-count'},(planWeek.ig.length+(dataWeek.customIg||[]).length)+' publicaciones')
        ),
        planWeek.ig.map((cfg,i)=>React.createElement(PostCard,{key:'ig'+i,planCfg:cfg,data:{...dataWeek.ig[i],topic:dataWeek.ig[i].topic!==undefined?dataWeek.ig[i].topic:cfg.topic},onUpdate:(f,v)=>onUpdate('ig',i,f,v)})),
        (dataWeek.customIg||[]).map((item,i)=>React.createElement(PostCard,{key:'cig'+i,planCfg:null,data:item,onUpdate:(f,v)=>onUpdateCustom('ig',i,f,v),onDelete:()=>onDeleteCustom('ig',i)})),
        React.createElement(AddButton,{plat:'ig',onAdd:type=>onAddCustom('ig',type)})
      ),
      React.createElement('div',{className:'platform'},
        React.createElement('div',{className:'plat-hdr li'},
          React.createElement('span',{style:{fontSize:14,marginRight:4}},'💼'),
          React.createElement('span',{className:'plat-name',style:{color:'#582D81'}},'LinkedIn'),
          React.createElement('span',{className:'plat-count'},(planWeek.li.length+(dataWeek.customLi||[]).length)+' publicaciones')
        ),
        planWeek.li.map((cfg,i)=>React.createElement(PostCard,{key:'li'+i,planCfg:cfg,data:{...dataWeek.li[i],topic:dataWeek.li[i].topic!==undefined?dataWeek.li[i].topic:cfg.topic},onUpdate:(f,v)=>onUpdate('li',i,f,v)})),
        (dataWeek.customLi||[]).map((item,i)=>React.createElement(PostCard,{key:'cli'+i,planCfg:null,data:item,onUpdate:(f,v)=>onUpdateCustom('li',i,f,v),onDelete:()=>onDeleteCustom('li',i)})),
        React.createElement(AddButton,{plat:'li',onAdd:type=>onAddCustom('li',type)})
      )
    )
  );
}

function App(){
  const[month,setMonth]=useState('2026-04');
  const[state,setState]=useState(()=>loadLS());
  const[saved,setSaved]=useState(true);
  const timer=useRef(null);

  useEffect(()=>{
    setSaved(false);
    if(timer.current)clearTimeout(timer.current);
    timer.current=setTimeout(()=>{saveLS(state);setSaved(true);},800);
    return()=>clearTimeout(timer.current);
  },[state]);

  const update=useCallback((mk,wi,plat,pi,field,val)=>{
    setState(prev=>{
      const n=JSON.parse(JSON.stringify(prev));
      if(n[mk]&&n[mk][wi]&&n[mk][wi][plat]&&n[mk][wi][plat][pi])n[mk][wi][plat][pi][field]=val;
      return n;
    });
  },[]);

  const addCustom=useCallback((mk,wi,plat,type)=>{
    setState(prev=>{
      const n=JSON.parse(JSON.stringify(prev));
      const k=plat==='ig'?'customIg':'customLi';
      if(!n[mk][wi][k])n[mk][wi][k]=[];
      n[mk][wi][k].push(emptyPost(type));
      return n;
    });
  },[]);

  const updateCustom=useCallback((mk,wi,plat,ci,field,val)=>{
    setState(prev=>{
      const n=JSON.parse(JSON.stringify(prev));
      const k=plat==='ig'?'customIg':'customLi';
      if(n[mk][wi][k]&&n[mk][wi][k][ci])n[mk][wi][k][ci][field]=val;
      return n;
    });
  },[]);

  const deleteCustom=useCallback((mk,wi,plat,ci)=>{
    setState(prev=>{
      const n=JSON.parse(JSON.stringify(prev));
      const k=plat==='ig'?'customIg':'customLi';
      if(n[mk][wi][k])n[mk][wi][k].splice(ci,1);
      return n;
    });
  },[]);

  const mData=state[month]||[];
  const all=mData.flatMap(w=>[...w.ig,...w.li,...(w.customIg||[]),...(w.customLi||[])]);
  const apr=all.filter(p=>p.status==='aprobado').length;
  const rev=all.filter(p=>p.status==='revision').length;
  const pct=all.length>0?Math.round((apr/all.length)*100):0;
  const gAll=Object.values(state).flatMap(mw=>mw.flatMap(w=>[...w.ig,...w.li,...(w.customIg||[]),...(w.customLi||[])]));
  const gApr=gAll.filter(p=>p.status==='aprobado').length;
  const mo=MONTHS.find(m=>m.key===month);

  return React.createElement('div',null,
    React.createElement('div',{className:'hdr'},
      React.createElement('div',{className:'hdr-top'},
        React.createElement('div',null,
          React.createElement('div',{className:'hdr-eyebrow'},'Los Martes No Hay Luna'),
          React.createElement('div',{className:'hdr-title'},'Plan de Contenidos 2026 — Abril a Diciembre')
        ),
        React.createElement('div',{className:'hdr-stats'},
          React.createElement('div',{className:'stat'},React.createElement('div',{className:'stat-n',style:{color:'#4ade80'}},apr),React.createElement('div',{className:'stat-l'},'Aprobados mes')),
          React.createElement('div',{className:'stat'},React.createElement('div',{className:'stat-n',style:{color:'#fbbf24'}},rev),React.createElement('div',{className:'stat-l'},'En revisión')),
          React.createElement('div',{className:'stat'},React.createElement('div',{className:'stat-n',style:{color:'#87B229'}},gApr),React.createElement('div',{className:'stat-l'},'Total aprobados')),
          React.createElement('span',{className:'save-badge',style:{color:saved?'#4ade80':'#fbbf24'}},saved?'● Guardado':'● Guardando...')
        )
      ),
      React.createElement('div',{className:'tabs'},
        MONTHS.map(m=>React.createElement('button',{key:m.key,className:'tab '+(m.key===month?'on':''),onClick:()=>setMonth(m.key)},m.name))
      )
    ),
    React.createElement('div',{className:'prog'},React.createElement('div',{className:'prog-bar',style:{width:pct+'%'}})),
    React.createElement('div',{className:'body'},
      React.createElement('div',{className:'mth-hd'},
        React.createElement('div',{className:'mth-accent'}),
        React.createElement('div',null,
          React.createElement('div',{className:'mth-name'},mo.name+' 2026'),
          React.createElement('div',{className:'mth-sub'},pct+'% completado · '+(mo.weeks.length*3)+' posts IG base · '+(mo.weeks.length*4)+' posts LI base')
        )
      ),
      mo.weeks.map((wl,wi)=>React.createElement(WeekSection,{
        key:wi,mk:month,wi,
        weekLabel:'Semana '+(wi+1)+' — '+wl,
        planWeek:PLAN[month][wi],
        dataWeek:mData[wi]||{ig:[],li:[],customIg:[],customLi:[]},
        onUpdate:(plat,pi,f,v)=>update(month,wi,plat,pi,f,v),
        onAddCustom:(plat,type)=>addCustom(month,wi,plat,type),
        onUpdateCustom:(plat,ci,f,v)=>updateCustom(month,wi,plat,ci,f,v),
        onDeleteCustom:(plat,ci)=>deleteCustom(month,wi,plat,ci),
        defOpen:wi===0,
      })),
      React.createElement('div',{className:'footer'},
        React.createElement('span',{className:'ft-l'},'LMNHL · Plan de Contenidos Abr–Dic 2026 · 9 meses'),
        React.createElement('span',{className:'ft-r'},'IG: Reel + Carrusel + Reflexión · LI: Autoridad + Estrategia + Opinión + Historia')
      )
    )
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
